<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Converter | Studio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #00ff88;
            --surface-color: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-secondary: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: #ffffff;
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        /* HERO SECTION */
        .hero {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            text-align: center;
            background: 
                radial-gradient(circle at 10% 20%, rgba(0, 255, 136, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(0, 200, 255, 0.03) 0%, transparent 50%);
        }

        .hero-content {
            max-width: 800px;
            padding: 20px;
        }

        .hero h1 {
            font-size: clamp(3rem, 10vw, 5.5rem);
            font-weight: 800;
            letter-spacing: -0.05em;
            line-height: 1;
            margin-bottom: 24px;
            background: linear-gradient(180deg, #FFFFFF 30%, rgba(255,255,255,0.4) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 0.3em;
        }

        .cta-button {
            display: inline-block;
            padding: 20px 48px;
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: 4px;
            background: #ffffff;
            color: #000000;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-decoration: none;
        }

        .cta-button:hover {
            background: var(--accent-color);
            transform: scale(1.05);
        }

        /* FORM SECTION */
        .form-section {
            padding: 120px 20px;
            display: flex;
            justify-content: center;
            background: var(--bg-color);
            min-height: 100vh;
        }

        .form-container {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 60px 50px;
            max-width: 500px;
            width: 100%;
        }

        .form-container h2 {
            font-size: 2rem;
            margin-bottom: 40px;
            font-weight: 800;
            letter-spacing: -0.03em;
            text-align: center;
        }

        /* INPUT STYLING */
        .input-wrapper {
            text-align: left;
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        select {
            width: 100%;
            padding: 16px;
            background: #0f0f11;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
            appearance: none;
            transition: border-color 0.3s;
        }

        select:focus {
            border-color: var(--accent-color);
        }

        /* DROP ZONE */
        .drop-zone {
            border: 1px dashed var(--border-color);
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent-color);
            background: rgba(0, 255, 136, 0.02);
        }

        .drop-zone p {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .drop-zone input[type="file"] {
            display: none;
        }

        /* CHECKBOX */
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #cbd5e1;
            margin: 25px 0 35px;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.3s;
        }

        .checkbox-label:hover {
            background: rgba(255,255,255,0.02);
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-color);
        }

        button[type="submit"] {
            width: 100%;
            padding: 20px;
            background: var(--accent-color);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.3s;
        }

        button[type="submit"]:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.2);
        }

        @media (max-width: 600px) {
            .form-container { padding: 40px 24px; }
            .hero h1 { font-size: 3.5rem; }
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('images');

            dropZone.addEventListener('click', () => fileInput.click());

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });

            dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                if (e.dataTransfer.files.length) {
                    fileInput.files = e.dataTransfer.files;
                    updateText(e.dataTransfer.files.length);
                }
            });

            fileInput.addEventListener('change', () => {
                if (fileInput.files.length) updateText(fileInput.files.length);
            });

            function updateText(n) {
                dropZone.querySelector('p').innerHTML = `<span style="color: var(--accent-color)">${n} file(s) selected</span>`;
            }
        });
    </script>
</head>

<body>

    <section class="hero" id="hero">
        <div class="hero-content">
            <h1>Swift Image <br> Processing.</h1>
            <p>Convert • Crop • Transpose</p>
            <a href="#form" class="cta-button">Launch Processor</a>
        </div>
    </section>

    <section class="form-section" id="form">
        <div class="form-container">
            <h2>Configuration</h2>

            <form method="POST" enctype="multipart/form-data">
                <div class="drop-zone" id="drop-zone">
                    <p>Drop source images or click to browse</p>
                    <input type="file" name="images" id="images" multiple required>
                </div>

                <div class="input-wrapper">
                    <label for="format">Output Format</label>
                    <select name="format" id="format">
                        <option value="webp">WebP (High Efficiency)</option>
                        <option value="png">PNG (Lossless)</option>
                        <option value="jpg">JPG (Standard)</option>
                    </select>
                </div>

                <div class="input-wrapper">
                    <label for="mode">Frame Control</label>
                    <select name="mode" id="mode">
                        <option value="fit">Fit to Canvas (800x800)</option>
                        <option value="crop">Geometric Crop (800x800)</option>
                    </select>
                </div>

                <div class="input-wrapper">
                    <label for="bg">Canvas Fill</label>
                    <select name="bg" id="bg">
                        <option value="white">Solid White</option>
                        <option value="transparent">Alpha Transparency</option>
                    </select>
                </div>

                <label class="checkbox-label">
                    <input type="checkbox" name="remove_bg" id="remove_bg">
                    Isolate Subject (Remove Background)
                </label>

                <button type="submit">Execute Task</button>
            </form>
        </div>
    </section>

</body>

</html>

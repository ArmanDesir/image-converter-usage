<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Converter | Studio</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #00ff88;
            --surface-color: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-secondary: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* HERO SECTION - REPLACED VIDEO WITH GRADIENT MESH */
        .hero {
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            text-align: center;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 136, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 200, 255, 0.05) 0%, transparent 40%);
        }

        .hero-content {
            max-width: 800px;
            padding: 20px;
            z-index: 2;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1.1;
            margin-bottom: 24px;
            background: linear-gradient(180deg, #FFFFFF 0%, #64748b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .cta-button {
            display: inline-block;
            padding: 18px 40px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 100px;
            background: #ffffff;
            color: #000000;
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            border: 1px solid #ffffff;
        }

        .cta-button:hover {
            background: transparent;
            color: #ffffff;
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(255, 255, 255, 0.1);
        }

        /* FORM SECTION */
        .form-section {
            padding: 100px 20px;
            display: flex;
            justify-content: center;
            background: var(--bg-color);
            min-height: 100vh;
        }

        .form-container {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            padding: 60px 40px;
            max-width: 540px;
            width: 100%;
            transition: border-color 0.3s ease;
        }

        .form-container:hover {
            border-color: rgba(0, 255, 136, 0.3);
        }

        .form-container img {
            height: 100px;
            margin-bottom: 30px;
            filter: grayscale(1) brightness(2);
            opacity: 0.8;
        }

        .form-container h2 {
            font-size: 1.8rem;
            margin-bottom: 40px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        /* INPUT STYLING */
        .input-wrapper {
            text-align: left;
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            cursor: pointer;
            appearance: none;
        }

        select:focus {
            border-color: var(--accent-color);
        }

        /* DROP ZONE */
        .drop-zone {
            border: 1px dashed var(--border-color);
            border-radius: 16px;
            padding: 45px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.01);
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent-color);
            background: rgba(0, 255, 136, 0.02);
        }

        .drop-zone p {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .drop-zone input[type="file"] {
            display: none;
        }

        /* CHECKBOX */
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #cbd5e1;
            margin: 20px 0 30px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-color);
        }

        button[type="submit"] {
            width: 100%;
            padding: 16px;
            background: var(--accent-color);
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button[type="submit"]:hover {
            transform: scale(1.02);
            background: #00df76;
        }

        @media (max-width: 600px) {
            .form-container { padding: 40px 20px; }
            .hero h1 { font-size: 2.8rem; }
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('images');

            dropZone.addEventListener('click', () => fileInput.click());

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });

            dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                if (e.dataTransfer.files.length) {
                    fileInput.files = e.dataTransfer.files;
                    updateText(e.dataTransfer.files.length);
                }
            });

            fileInput.addEventListener('change', () => {
                if (fileInput.files.length) updateText(fileInput.files.length);
            });

            function updateText(n) {
                dropZone.querySelector('p').innerText = `${n} file(s) selected`;
                dropZone.querySelector('p').style.color = "var(--accent-color)";
            }
        });
    </script>
</head>

<body>

    <section class="hero" id="hero">
        <div class="hero-content">
            <h1>High Fidelity eyy <br> Image Conversion.</h1>
            <p>WebP • PNG • JPG • BG Removal</p>
            <a href="#form" class="cta-button">Get Started</a>
        </div>
    </section>

    <section class="form-section" id="form">
        <div class="form-container">
            <img src="{{ url_for('static', filename='monyet.png') }}" style="height: 15rem;" alt="Monkey Logo">
            <h2>Image Converter</h2>

            <form method="POST" enctype="multipart/form-data">
                <div class="drop-zone" id="drop-zone">
                    <p>Drag & drop images or click to upload</p>
                    <input type="file" name="images" id="images" multiple required>
                </div>

                <div class="input-wrapper">
                    <label for="format">Export Format</label>
                    <select name="format" id="format">
                        <option value="webp">WebP (Optimized)</option>
                        <option value="png">PNG (Lossless)</option>
                        <option value="jpg">JPG (Standard)</option>
                    </select>
                </div>

                <div class="input-wrapper">
                    <label for="mode">Crop Mode</label>
                    <select name="mode" id="mode">
                        <option value="fit">Fit to Canvas (800x800)</option>
                        <option value="crop">Center Crop (800x800)</option>
                    </select>
                </div>

                <div class="input-wrapper">
                    <label for="bg">Background</label>
                    <select name="bg" id="bg">
                        <option value="white">Solid White</option>
                        <option value="transparent">Transparent</option>
                    </select>
                </div>

                <label class="checkbox-label">
                    <input type="checkbox" name="remove_bg" id="remove_bg">
                    Apply AI Background Removal
                </label>

                <button type="submit">Process & Download</button>
            </form>
        </div>
    </section>

</body>

</html>
